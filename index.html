<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para una mujer extraordinaria 💜</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #6a1b9a, #2a0045, #12001f);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            color: white;
        }

        .contenedor {
            text-align: center;
            z-index: 10;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 35px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 20px rgba(171, 71, 188, 0.3);
            max-width: 420px;
            width: 85%;
            animation: entrada Suave 1.2s ease-out;
        }

        .imagen-regalo {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            margin-bottom: 25px;
            border: 2px solid rgba(225, 190, 231, 0.3);
        }

        h1 {
            color: #f3e5f5;
            text-shadow: 0 2px 10px rgba(0,0,0,0.4);
            font-size: 26px;
            margin-bottom: 20px;
            font-weight: 300;
        }

        button {
            background: linear-gradient(45deg, #ab47bc, #7b1fa2);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(123, 31, 162, 0.4);
            animation: pulso 2s infinite;
        }

        button:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 8px 25px rgba(171, 71, 188, 0.6);
            background: linear-gradient(45deg, #ce93d8, #ab47bc);
        }

        #mensaje-final {
            display: none;
            margin-top: 20px;
            animation: aparecerTexto 1.5s forwards;
        }

        .texto-dedicatoria {
            font-size: 19px;
            line-height: 1.6;
            color: #f3e5f5;
            font-style: italic;
        }

        /* --- Animaciones --- */
        @keyframes entradaSuave {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulso {
            0% { box-shadow: 0 0 0 0 rgba(171, 71, 188, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(171, 71, 188, 0); }
            100% { box-shadow: 0 0 0 0 rgba(171, 71, 188, 0); }
        }

        @keyframes aparecerTexto {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .particula {
            position: absolute;
            pointer-events: none;
            z-index: 1;
            animation: flotarVariado 6s linear infinite;
        }

        @keyframes flotarVariado {
            0% { transform: translateY(110vh) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            50% { transform: translateY(50vh) translateX(20px) rotate(180deg); }
            100% { transform: translateY(-10vh) translateX(-20px) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <img src="https://images.unsplash.com/photo-1526047932273-341f2a7631f9?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" 
             alt="Flores moradas" class="imagen-regalo">
        
        <h1>Para una mujer extraordinaria</h1>
        
        <button id="boton" onclick="lanzarMagia()">Toca para tu sorpresa ✨</button>
        
        <div id="mensaje-final">
            <div class="texto-dedicatoria">
                <p><strong>¡Feliz Día de la Mujer!</strong></p>
                <p>Hoy celebramos tu fuerza, tu inteligencia y el corazón tan inmenso que tienes. Gracias por hacer del mundo un lugar más brillante.</p>
                <p>💜💜💜</p>
            </div>
        </div>
    </div>

    <script>
        function lanzarMagia() {
            const boton = document.getElementById('boton');
            const mensaje = document.getElementById('mensaje-final');
            
            boton.style.display = 'none';
            mensaje.style.display = 'block';

            const elementos = ['💜', '✨', '🌸', '🌷', '💎', '💫', '💜', '✨'];
            
            for (let i = 0; i < 60; i++) {
                setTimeout(() => {
                    const p = document.createElement('div');
                    p.className = 'particula';
                    p.innerText = elementos[Math.floor(Math.random() * elementos.length)];
                    p.style.left = Math.random() * 100 + 'vw';
                    p.style.fontSize = (Math.random() * 25 + 15) + 'px';
                    p.style.animationDuration = (Math.random() * 4 + 3) + 's';
                    p.style.filter = "drop-shadow(0 0 5px rgba(255,255,255,0.5))";
                    document.body.appendChild(p);
                    
                    setTimeout(() => p.remove(), 7000);
                }, i * 120);
            }
        }
    </script>
</body>
</html>
