<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Día de la Mujer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #fce4ec, #f3e5f5);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .tarjeta {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 80%;
            width: 400px;
            z-index: 10;
            transition: transform 0.3s ease;
        }
        .tarjeta:hover {
            transform: translateY(-5px);
        }
        h1 {
            color: #8e24aa;
            font-size: 28px;
            margin-bottom: 10px;
        }
        p {
            color: #555;
            font-size: 18px;
            line-height: 1.6;
            display: none; /* El mensaje está oculto al principio */
        }
        button {
            background-color: #ab47bc;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            transition: background 0.3s, transform 0.2s;
            box-shadow: 0 5px 15px rgba(171, 71, 188, 0.4);
        }
        button:hover {
            background-color: #8e24aa;
            transform: scale(1.05);
        }
        .flor {
            position: absolute;
            font-size: 28px;
            animation: flotar 4s linear infinite;
            opacity: 0.8;
            pointer-events: none;
        }
        @keyframes flotar {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="tarjeta">
        <h1>Para una Mujer Extraordinaria</h1>
        <button id="btnMensaje" onclick="mostrarMensaje()">Toca aquí para tu sorpresa ✨</button>
        <p id="mensaje"><strong>¡Feliz Día de la Mujer!</strong><br><br>Hoy celebramos tu fuerza, tu inteligencia, tu luz y todo lo que te hace única. Que nunca dejes de brillar ni de perseguir tus sueños. 💜</p>
    </div>

    <script>
        function mostrarMensaje() {
            // Mostrar el texto y ocultar el botón
            document.getElementById('mensaje').style.display = 'block';
            document.getElementById('btnMensaje').style.display = 'none';
            
            // Crear el efecto de las flores cayendo/subiendo
            const elementos = ['🌸', '🌺', '🌷', '✨', '💜'];
            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const flor = document.createElement('div');
                    flor.className = 'flor';
                    flor.innerText = elementos[Math.floor(Math.random() * elementos.length)];
                    flor.style.left = Math.random() * 100 + 'vw';
                    flor.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    flor.style.fontSize = (Math.random() * 20 + 15) + 'px';
                    document.body.appendChild(flor);
                    
                    // Limpiar la pantalla después de la animación
                    setTimeout(() => {
                        flor.remove();
                    }, 5000);
                }, i * 100); // Retraso para que salgan poco a poco
            }
        }
    </script>
</body>
</html>
